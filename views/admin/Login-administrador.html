<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrador</title>
    <link rel="stylesheet" href="/assets/styles/Estilo-login.css">
    <link rel="icon" type="image/x-icon" href="/assets/icons/usuario.png">
    
    <style>
        .login-form h2 { color: #00ff00; }
        .admin-btn {
            background-color: #00ff00 !important;
            border: none;
            cursor: pointer;
        }
        .admin-btn:hover { background-color: #00cc00 !important; }
        .register-link {
            display: block;
            margin-top: 15px;
            color: #00ff00;
            text-decoration: none;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <form class="login-form" action="/admin-auth" method="POST">
            <h2>Acceso Administrador</h2>
            <p>Panel de control del sistema</p>
            
            <div class="input-group">
                <input type="text" id="admin-user" name="admin-user" required>
                <label for="admin-user">ID de Usuario Administrador</label>
            </div>

            <div class="input-group">
                <input type="password" id="admin-password" name="admin-password" required>
                <label for="admin-password">Contraseña Maestra</label>
            </div>

            <button type="submit" class="login-btn admin-btn">Ingresar al Panel</button>

            <a href="Registrar-administrador.html" class="register-link">¿No tienes cuenta? Regístrate aquí</a>

            <div style="margin-top: 20px; text-align: left;">
                <a href="/views/public/Inicio.html" style="color: #999; text-decoration: none;">← Volver al sitio principal</a>
            </div>
        </form>
    </div>
</body>
</html>
