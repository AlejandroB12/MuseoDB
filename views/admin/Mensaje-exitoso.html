<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Exitoso | System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #121212;
            padding: 20px;
            color: white;
        }
        .login-container {
            background: #1e1e1e;
            padding: 50px 40px; 
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .success-icon {
            font-size: 60px;
            color: #00ff00;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(0, 255, 0, 0.5));
        }
        h2 {
            color: #00ff00;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        p { color: #888; font-size: 15px; margin-bottom: 30px; line-height: 1.5; }
        .login-btn {
            width: 100%;
            padding: 16px;
            background: #00ff00;
            border: none;
            border-radius: 5px;
            color: #121212;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        .login-btn:hover {
            background: #00cc00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="success-icon">✔</div>
        <h2>Registro Exitoso</h2>
        <p>El administrador ha sido registrado correctamente en la base de datos del sistema.</p>
        <a href="../inicio_sesion/Login-administrador.html" class="login-btn">Volver al Panel</a>
    </div>
</body>
</html>
