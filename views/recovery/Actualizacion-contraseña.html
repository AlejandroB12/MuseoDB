<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contraseña Actualizada</title>
    <link rel="stylesheet" href="/styles/Estilo-login.css">
    <style>
        /* Ajuste para que el icono de éxito brille como tus títulos */
        .success-icon {
            color: #00ff00;
            font-size: 50px;
            margin-bottom: 20px;
            display: block;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-form" style="text-align: center;">
            <span class="success-icon">✔</span>
            <h2>¡Todo listo!</h2>
            <p>Tu contraseña ha sido actualizada correctamente.</p>
            
            <div class="register-link">
                <a href="/" class="login-btn" style="text-decoration: none; display: block; text-align: center; color: #000 !important;">
                    Ir al Login
                </a>
            </div>
        </div>
    </div>
</body>
</html>
