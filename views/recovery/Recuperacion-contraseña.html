<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>
    <link rel="stylesheet" href="/assets/styles/Estilo-login.css">
    <link rel="stylesheet" href="/assets/styles/Estilo-recuperacion.css">
</head>
<body>
    <div class="login-container"> <form class="login-form" action="/recuperar-pw" method="POST">
            <h2>Recuperar Contraseña</h2>
            <p class="instruction-text">Ingresa tu correo electrónico y te enviaremos tu contraseña actual.</p>
            
            <div class="input-group">
                <input type="email" id="correo" name="correo" required>
                <label for="correo">Correo Electrónico</label>
            </div>

            <button type="submit" class="login-btn">Enviar Contraseña</button>

            <div class="register-link">
                <a href="/views/user/Login.html" class="back-link">← Volver al Login</a>
            </div>
        </form>
    </div>
</body>
</html>
