<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activación Pendiente | System</title>
    <link rel="icon" type="image/x-icon" href="/icons/usuario.png">
    <style>
        /* --- ESTILOS BASE (Inspirados en tu Estilo-login.css) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #121212; /* Fondo oscuro profundo */
            padding: 20px;
            color: white;
        }

        .login-container {
            background: #1e1e1e;
            padding: 50px 40px; 
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
        }

        /* --- CONTENIDO DE ACTIVACIÓN --- */
        .icon-box {
            font-size: 50px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(0, 255, 0, 0.5)); /* Brillo neón al emoji */
        }

        h2 {
            color: #00ff00; /* Verde Neón */
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .main-msg {
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 25px;
        }

        /* --- ALERTA DE INFORMACIÓN ESTILO NEÓN --- */
        .info-alert {
            background: rgba(0, 255, 0, 0.05); /* Fondo verde muy sutil */
            border-left: 4px solid #00ff00; /* Borde neón */
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            text-align: left;
        }

        .info-alert p {
            color: #ccc;
            font-size: 14px;
            line-height: 1.5;
            margin: 0;
        }

        .info-alert strong {
            color: #00ff00; /* Resaltado en verde */
            font-weight: 700;
        }

        .spam-notice {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }

        /* --- BOTÓN REINTENTAR / VOLVER (Opcional por si lo necesitas) --- */
        .login-btn {
            width: 100%;
            padding: 16px;
            background: #00ff00;
            border: none;
            border-radius: 5px;
            color: #121212;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #00cc00;
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="activation-content">
            <div class="icon-box">✉️</div>
            <h2>Cuenta Pendiente</h2>
            <p class="main-msg">Tu cuenta aún no está activa.</p>
            
            <div class="info-alert">
                <p>Se ha enviado un <strong>código de autentcacion</strong> a tu correo electrónico.</p>
            </div>

            <p class="spam-notice">Si no lo encuentras, revisa tu carpeta de <b>Spam</b>.</p>
            
            <a href="/public/Inicio.html" class="login-btn">Volver al Inicio</a>
        </div>
    </div>
</body>
</html>
