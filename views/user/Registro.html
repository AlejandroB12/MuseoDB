<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Museo Virtual</title>
    <link rel="stylesheet" href="/assets/styles/Estilo-registro.css">
    <link rel="icon" type="image/x-icon" href="/assets/icons/registro.png">
    <style>
        /* Estilos del resumen de pago */
        .order-summary {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #00ff00;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        .order-info span { display: block; color: #999; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .order-info strong { color: #fff; font-size: 1.1rem; }
        .price-tag {
            background: #00ff00; color: #000; padding: 8px 15px; border-radius: 5px;
            font-weight: 900; font-size: 1.4rem; box-shadow: 0 0 15px rgba(0, 255, 0, 0.6);
        }
        .payment-section { margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .login-btn { background: #00ff00 !important; color: #000 !important; font-weight: bold; cursor: pointer; }
        
        /* Asegurar que los select se vean igual que los input */
        select { 
            width: 100%; 
            background: #1a1a1a; 
            color: #fff; 
            padding: 12px; 
            border: 1px solid #555; 
            border-radius: 4px; 
            margin-bottom: 10px;
            outline: none;
        }
        select:focus { border-color: #00ff00; }
        select option { background: #1a1a1a; color: #fff; }
        
        .input-row.no-stack { display: flex; gap: 10px; }
        .small { flex: 1; }
    </style>
</head>
<body>
    <div class="login-container register-container">
        <form class="login-form" action="/registrar" method="POST">
            <h2>Crear Cuenta</h2>
            
            <div class="input-row">
                <div class="input-group">
                    <input type="text" name="nombre" required placeholder=" "> 
                    <label>Nombre</label>
                </div>
                <div class="input-group">
                    <input type="text" name="apellido" required placeholder=" "> 
                    <label>Apellido</label>
                </div>
            </div>

            <div class="input-group">
                <input type="text" name="cedula" maxlength="12" required placeholder=" "> 
                <label>Cédula</label>
            </div>

            <div class="input-group">
                <input type="tel" name="telefono" required placeholder=" "> 
                <label>Teléfono</label>
            </div>

            <div class="input-group">
                <input type="email" name="correo" required placeholder=" "> 
                <label>Correo Electrónico</label>
            </div>

            <div class="input-group">
                <input type="password" name="password" required placeholder=" "> 
                <label>Contraseña</label>
            </div>

            <div class="input-group">
                <select name="estado" id="select-estado" required>
                    <option value="" disabled selected>Seleccione el Estado</option>
                </select>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <select name="municipio" id="select-municipio" required disabled>
                        <option value="" disabled selected>Municipio</option>
                    </select>
                </div>
                <div class="input-group">
                    <select name="parroquia" id="select-parroquia" required disabled>
                        <option value="" disabled selected>Parroquia</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <input type="text" name="calle" required placeholder=" "> 
                <label>Calle / Avenida / Referencia</label>
            </div>

            <div class="payment-section">
                <h3 class="electric-title">Información de Pago</h3>
                <br>
                <div class="order-summary">
                    <div class="order-info">
                        <span>Total a pagar</span>
                        <strong>Suscripción Digital</strong>
                    </div>
                    <div class="price-tag">$10.00</div>
                    <input type="hidden" name="monto" value="10.00">
                </div>

                <div class="input-group">
                    <input type="text" name="tarjeta" id="card-number" maxlength="19" required placeholder=" ">
                    <label>Número de Tarjeta</label>
                </div>

                <div class="input-row no-stack">
                    <div class="input-group small">
                        <input type="text" name="expiracion" id="expiry-date" maxlength="5" required placeholder=" ">
                        <label>Vence (MM/YY)</label>
                    </div>
                    <div class="input-group small">
                        <input type="password" name="cvv" maxlength="3" required placeholder=" ">
                        <label>CVV</label>
                    </div>
                </div>
            </div>

            <button type="submit" class="login-btn">Finalizar Registro y Pagar</button>
            
            <div class="register-link">
                <p>¿Ya tienes cuenta? <a href="Login.html">Inicia sesión</a></p>
            </div>
        </form>
        <a href="/views/public/inicio.html" class="forgot-password" style="color: #999; display: block; margin-top: 20px; text-align: left;">← Inicio</a>
    </div>

    <script>
        // --- FORMATEO DE INPUTS DE TARJETA ---
        const cardInput = document.getElementById('card-number');
        cardInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            e.target.value = value.replace(/(\d{4})(?=\d)/g, '$1 ').trim();
        });

        const expiryInput = document.getElementById('expiry-date');
        expiryInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length >= 2) e.target.value = value.slice(0, 2) + '/' + value.slice(2, 4);
            else e.target.value = value;
        });

        // --- LÓGICA DE UBICACIÓN (API) ---
        const selectEstado = document.getElementById('select-estado');
        const selectMunicipio = document.getElementById('select-municipio');
        const selectParroquia = document.getElementById('select-parroquia');

        // 1. Cargar Estados
        fetch('/api/estados')
            .then(res => res.json())
            .then(data => {
                data.forEach(est => {
                    const nombre = est.Nombre || est.nombre;
                    selectEstado.innerHTML += `<option value="${est.id_estado}">${nombre}</option>`;
                });
            })
            .catch(err => console.error("Error al cargar estados:", err));

        // 2. Al cambiar Estado -> Municipios
        selectEstado.addEventListener('change', (e) => {
            const idEstado = e.target.value;
            
            selectMunicipio.disabled = false;
            selectMunicipio.innerHTML = '<option value="" disabled selected>Cargando municipios...</option>';
            selectParroquia.innerHTML = '<option value="" disabled selected>Parroquia</option>';
            selectParroquia.disabled = true;

            fetch(`/api/municipios/${idEstado}`)
                .then(res => res.json())
                .then(data => {
                    selectMunicipio.innerHTML = '<option value="" disabled selected>Seleccione Municipio</option>';
                    data.forEach(mun => {
                        const nombre = mun.Nombre || mun.nombre;
                        selectMunicipio.innerHTML += `<option value="${mun.id_municipio}">${nombre}</option>`;
                    });
                });
        });

        // 3. Al cambiar Municipio -> Parroquias
        selectMunicipio.addEventListener('change', (e) => {
            const idMunicipio = e.target.value;
            
            selectParroquia.disabled = false;
            selectParroquia.innerHTML = '<option value="" disabled selected>Cargando parroquias...</option>';

            fetch(`/api/parroquias/${idMunicipio}`)
                .then(res => res.json())
                .then(data => {
                    selectParroquia.innerHTML = '<option value="" disabled selected>Seleccione Parroquia</option>';
                    data.forEach(par => {
                        const nombre = par.Nombre || par.nombre;
                        selectParroquia.innerHTML += `<option value="${par.id_parroquia}">${nombre}</option>`;
                    });
                });
        });
    </script>
</body>
</html>
