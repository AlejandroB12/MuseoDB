<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Exitoso | System</title>
    <style>
        /* --- ESTILOS BASE (Inspirados en tu Estilo-login.css) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #121212; /* Fondo oscuro profundo */
            padding: 20px;
            color: white;
        }

        .login-container {
            background: #1e1e1e;
            padding: 50px 40px; 
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 255, 0, 0.15); /* Sombra con toque verde */
            border: 1px solid #00ff00; /* Borde resaltado en verde */
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        /* --- ANIMACIÓN DE ENTRADA --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- CONTENIDO DE ÉXITO --- */
        .success-icon {
            font-size: 60px;
            margin-bottom: 20px;
            color: #00ff00;
            filter: drop-shadow(0 0 15px rgba(0, 255, 0, 0.4));
        }

        h2 {
            color: #00ff00; /* Verde Neón */
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .success-msg {
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .details {
            color: #888;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        /* --- BOTÓN DE ACCESO --- */
        .login-btn {
            width: 100%;
            padding: 16px;
            background: #00ff00;
            border: none;
            border-radius: 5px;
            color: #121212;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .login-btn:hover {
            background: #05ff05;
            transform: scale(1.02);3
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.4);
        }

        .auto-redirect {
            margin-top: 20px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="success-icon">✓</div>
        <h2>¡Logrado!</h2>
        <p class="success-msg">Su registro fue un éxito</p>
        
        <p class="details">
            Tu cuenta esta pendiente, despues que se verifique el pago.
            Revise su correo con el codigo de autenticacion.
        </p>

        <a href="Contenido/inicio.html" class="login-btn">Inicio de la pagina</a>

    </div>
</body>
</html>
