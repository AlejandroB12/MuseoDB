<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/styles/Estilo-login.css">
    <link rel="icon" type="image/x-icon" href="../Iconos/usuario.png">
</head>
<body>
    <div class="login-container">
        <form class="login-form" action="/login-auth" method="POST">
            <h2>Bienvenido</h2>
            <p>Por favor, ingresa tus credenciales</p>
            
            <div class="input-group">
                <input type="text" id="username" name="username" required>
                <label for="username">Correo Electrónico</label>
            </div>

            <div class="input-group">
                <input type="password" id="password" name="password" required>
                <label for="password">Contraseña</label>
            </div>

           <div class="options">
                <a href="Recuperacion-contraseña.html" class="forgot-password">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="login-btn">Iniciar Sesión</button>

            <div class="register-link">
                <p>¿No tienes cuenta? <a href="Registro.html">Regístrate aquí</a></p>
            </div>
            <a href="/public/Inicio.html" class="forgot-password" style="color: #999;">← Inicio</a>
        </form>
    </div>
</body>
</html>
