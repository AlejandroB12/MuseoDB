<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Envío | Museo</title>
    <style>
        /* === ESTILOS GENERALES === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #121212;
            padding: 20px;
            color: white;
        }

        .register-container {
            background: #1e1e1e;
            padding: 50px 40px 40px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .login-form {
            width: 100%;
        }

        .login-form h2 {
            text-align: center;
            color: #00ff00;
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .login-form p {
            text-align: center;
            color: #888;
            font-size: 15px;
            margin-bottom: 30px;
        }

        .order-summary {
            background: #252525;
            border-left: 4px solid #00ff00;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            width: 100%;
        }

        .order-summary p {
            text-align: left;
            margin: 8px 0;
            color: #ccc;
            font-size: 0.95rem;
        }

        .order-summary strong {
            color: #00ff00;
        }

        .address-card {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            width: 100%;
        }

        .address-card h3 {
            color: #00ff00;
            font-size: 16px;
            text-transform: uppercase;
            margin-bottom: 15px;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }

        .address-card .address-label {
            color: #888;
            font-size: 0.85rem;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .address-card select, .address-card input {
            width: 100%;
            background: #333;
            border: 1px solid #555;
            color: white;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 12px;
            font-size: 1rem;
        }

        .address-card select option {
            background: #333;
            color: white;
        }

        .address-card select:focus, .address-card input:focus {
            outline: none;
            border-color: #00ff00;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.3);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            margin: 10px 0 10px 0;
            background: #00ff00;
            border: none;
            border-radius: 5px;
            color: #121212;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-btn:hover {
            background: #00cc00;
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        .login-btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .back-link:hover {
            color: #00ff00;
        }

        .loading {
            display: none;
            color: #00ff00;
            text-align: center;
            margin-top: 10px;
        }

        .error-message {
            color: #ff4444;
            text-align: center;
            margin-top: 10px;
            display: none;
        }

        .guia-field {
            margin-bottom: 15px;
            text-align: left;
        }

        .guia-field label {
            color: #888;
            font-size: 0.9rem;
            display: block;
            margin-bottom: 5px;
        }

        .guia-field input {
            width: 100%;
            background: #333;
            border: 1px solid #555;
            color: white;
            padding: 8px;
            border-radius: 4px;
        }

        @media (max-width: 480px) {
            .register-container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        
        <form class="login-form" id="envioForm">
            <h2>ENVÍO</h2>
            <p>Confirma los datos para el envío de la obra</p>

            <!-- factura (datos dinámicos) -->
            <div class="order-summary" id="facturaSummary">
                <p><strong>#Factura:</strong> <span id="facturaNumero">Cargando...</span></p>
                <p><strong>Cliente:</strong> <span id="clienteNombre">Cargando...</span></p>
                <p><strong>Cédula:</strong> <span id="clienteCedula">Cargando...</span></p>
                <p><strong>Obra:</strong> <span id="obraDetalle">Cargando...</span></p>
                <p><strong>Total con IVA:</strong> <span id="totalPagado">Cargando...</span>€</p>
            </div>

            <!-- dirección del cliente con selectores -->
            <div class="address-card">
                <h3>📍 Dirección de Envío</h3>
                
                <div class="address-label">Estado</div>
                <select id="estado" required>
                    <option value="">Cargando estados...</option>
                </select>

                <div class="address-label">Municipio</div>
                <select id="municipio" required disabled>
                    <option value="">Primero seleccione un estado</option>
                </select>

                <div class="address-label">Parroquia</div>
                <select id="parroquia" required disabled>
                    <option value="">Primero seleccione un municipio</option>
                </select>

                <div class="address-label">Calle / Av / Urbanización</div>
                <input type="text" id="direccion" placeholder="Ej: Calle 3, atlántico. Los Mangos" required>
            </div>

            <!-- Número de guía (opcional) -->
            <div class="guia-field">
                <label>📦 Número de guía (opcional):</label>
                <input type="text" id="numeroGuia" placeholder="Ej: 1234-5678-90">
            </div>

            <button type="submit" class="login-btn" id="submitBtn">Confirmar envío</button>
            
            <!-- Mensajes de estado -->
            <div class="loading" id="loading">Procesando...</div>
            <div class="error-message" id="error"></div>
        </form>

        <a href="Panel-administrador.html" class="back-link">← Volver al panel</a>
    </div>

    <script>
        // Obtener ID de factura de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const idFactura = urlParams.get('id_factura');

        console.log('ID de factura:', idFactura);

        // Si no hay ID de factura, redirigir
        if (!idFactura) {
            alert('No se especificó ninguna factura');
            window.location.href = 'Panel-administrador.html';
        }

        // Cargar estados al iniciar
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('DOM cargado, cargando estados...');
            await cargarEstados();
            await cargarFactura();
        });

        // Cargar lista de estados
       // Cargar lista de estados
async function cargarEstados() {
    try {
        console.log('Solicitando estados...');
        const response = await fetch('/api/estados');
        console.log('Respuesta estados:', response.status);
        
        if (!response.ok) {
            throw new Error(`Error HTTP: ${response.status}`);
        }
        
        const data = await response.json();
        console.log('Estados recibidos:', data);
        
        const selectEstado = document.getElementById('estado');
        
        // Verificar el formato de la respuesta
        if (Array.isArray(data)) {
            // Formato: array directo
            selectEstado.innerHTML = '<option value="">Seleccione un estado</option>';
            data.forEach(estado => {
                selectEstado.innerHTML += `<option value="${estado.id_estado}">${estado.nombre}</option>`;
            });
        } else if (data.success && data.estados) {
            // Formato: { success: true, estados: [...] }
            selectEstado.innerHTML = '<option value="">Seleccione un estado</option>';
            data.estados.forEach(estado => {
                selectEstado.innerHTML += `<option value="${estado.id_estado}">${estado.nombre}</option>`;
            });
        } else {
            throw new Error('Formato de datos no reconocido');
        }
    } catch (error) {
        console.error('Error cargando estados:', error);
        document.getElementById('estado').innerHTML = '<option value="">Error cargando estados</option>';
        showError('Error al cargar los estados: ' + error.message);
    }
}
        // Cargar municipios cuando se selecciona un estado
document.getElementById('estado').addEventListener('change', async function() {
    const idEstado = this.value;
    const selectMunicipio = document.getElementById('municipio');
    const selectParroquia = document.getElementById('parroquia');
    
    selectMunicipio.disabled = true;
    selectParroquia.disabled = true;
    selectParroquia.innerHTML = '<option value="">Primero seleccione un municipio</option>';
    
    if (!idEstado) {
        selectMunicipio.innerHTML = '<option value="">Primero seleccione un estado</option>';
        return;
    }
    
    try {
        console.log('Solicitando municipios para estado:', idEstado);
        const response = await fetch(`/api/municipios/${idEstado}`);
        
        if (!response.ok) {
            throw new Error(`Error HTTP: ${response.status}`);
        }
        
        const data = await response.json();
        console.log('Municipios recibidos:', data);
        
        selectMunicipio.innerHTML = '<option value="">Seleccione un municipio</option>';
        
        if (Array.isArray(data)) {
            // Formato: array directo
            data.forEach(municipio => {
                selectMunicipio.innerHTML += `<option value="${municipio.id_municipio}">${municipio.nombre}</option>`;
            });
        } else if (data.success && data.municipios) {
            // Formato: { success: true, municipios: [...] }
            data.municipios.forEach(municipio => {
                selectMunicipio.innerHTML += `<option value="${municipio.id_municipio}">${municipio.nombre}</option>`;
            });
        } else {
            throw new Error('Formato de datos no reconocido');
        }
        
        selectMunicipio.disabled = false;
    } catch (error) {
        console.error('Error cargando municipios:', error);
        selectMunicipio.innerHTML = '<option value="">Error cargando municipios</option>';
    }
});

// Cargar parroquias cuando se selecciona un municipio
document.getElementById('municipio').addEventListener('change', async function() {
    const idMunicipio = this.value;
    const selectParroquia = document.getElementById('parroquia');
    
    selectParroquia.disabled = true;
    
    if (!idMunicipio) {
        selectParroquia.innerHTML = '<option value="">Primero seleccione un municipio</option>';
        return;
    }
    
    try {
        console.log('Solicitando parroquias para municipio:', idMunicipio);
        const response = await fetch(`/api/parroquias/${idMunicipio}`);
        
        if (!response.ok) {
            throw new Error(`Error HTTP: ${response.status}`);
        }
        
        const data = await response.json();
        console.log('Parroquias recibidas:', data);
        
        selectParroquia.innerHTML = '<option value="">Seleccione una parroquia</option>';
        
        if (Array.isArray(data)) {
            // Formato: array directo
            data.forEach(parroquia => {
                selectParroquia.innerHTML += `<option value="${parroquia.id_parroquia}">${parroquia.nombre}</option>`;
            });
        } else if (data.success && data.parroquias) {
            // Formato: { success: true, parroquias: [...] }
            data.parroquias.forEach(parroquia => {
                selectParroquia.innerHTML += `<option value="${parroquia.id_parroquia}">${parroquia.nombre}</option>`;
            });
        } else {
            throw new Error('Formato de datos no reconocido');
        }
        
        selectParroquia.disabled = false;
    } catch (error) {
        console.error('Error cargando parroquias:', error);
        selectParroquia.innerHTML = '<option value="">Error cargando parroquias</option>';
    }
});

        // Cargar datos de la factura
        async function cargarFactura() {
            try {
                console.log('Solicitando factura:', idFactura);
                const response = await fetch(`/api/factura/${idFactura}`);
                console.log('Respuesta factura:', response.status);
                
                if (!response.ok) {
                    throw new Error(`Error HTTP: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Datos de factura recibidos:', data);
                
                if (data.success && data.factura) {
                    // Formatear número de factura
                    const facturaFormateada = data.factura.id_factura.toString().padStart(8, '0');
                    
                    // Llenar resumen
                    document.getElementById('facturaNumero').textContent = facturaFormateada;
                    
                    const nombreCompleto = `${data.factura.Nombre || ''} ${data.factura.Apellido || ''}`.trim();
                    document.getElementById('clienteNombre').textContent = nombreCompleto || 'No disponible';
                    document.getElementById('clienteCedula').textContent = data.factura.Cedula || 'No disponible';
                    
                    const precioFormateado = (data.factura.Precio || 0).toLocaleString('es-VE', {
                        minimumFractionDigits: 2,
                        maximumFractionDigits: 2
                    });
                    document.getElementById('obraDetalle').textContent = 
                        `${data.factura.nombre_obra || 'Obra'} - ${precioFormateado}€`;
                    
                    const totalFormateado = (data.factura.Total_Pagado || 0).toLocaleString('es-VE', {
                        minimumFractionDigits: 2,
                        maximumFractionDigits: 2
                    });
                    document.getElementById('totalPagado').textContent = totalFormateado;
                    
                    // Si hay dirección guardada, seleccionar los valores
                    if (data.direccion) {
                        console.log('Dirección encontrada:', data.direccion);
                        await seleccionarDireccion(data.direccion);
                    } else {
                        console.log('No hay dirección guardada para este comprador');
                    }
                } else {
                    throw new Error(data.message || 'Error al cargar la factura');
                }
            } catch (error) {
                console.error('Error cargando factura:', error);
                showError('Error al cargar los datos de la factura: ' + error.message);
            }
        }

        // Función para seleccionar la dirección guardada
        async function seleccionarDireccion(direccion) {
            console.log('Seleccionando dirección:', direccion);
            
            // Verificar que tenemos los IDs necesarios
            if (!direccion.id_estado || !direccion.id_municipio || !direccion.id_parroquia) {
                console.warn('La dirección no tiene todos los IDs necesarios');
                return;
            }
            
            // Seleccionar estado
            const selectEstado = document.getElementById('estado');
            selectEstado.value = direccion.id_estado;
            
            // Disparar cambio para cargar municipios
            const event = new Event('change');
            selectEstado.dispatchEvent(event);
            
            // Esperar a que carguen los municipios y seleccionar
            setTimeout(() => {
                const selectMunicipio = document.getElementById('municipio');
                if (selectMunicipio.options.length > 1) {
                    selectMunicipio.value = direccion.id_municipio;
                    
                    // Disparar cambio para cargar parroquias
                    selectMunicipio.dispatchEvent(event);
                    
                    // Esperar a que carguen las parroquias y seleccionar
                    setTimeout(() => {
                        const selectParroquia = document.getElementById('parroquia');
                        if (selectParroquia.options.length > 1) {
                            selectParroquia.value = direccion.id_parroquia;
                        }
                        
                        // Llenar dirección detallada
                        if (direccion.direccion_detallada) {
                            document.getElementById('direccion').value = direccion.direccion_detallada;
                        }
                    }, 1000);
                }
            }, 1000);
        }

        // Manejar envío del formulario
        // Manejar envío del formulario
document.getElementById('envioForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    // Validar campos
    const estado = document.getElementById('estado').value;
    const municipio = document.getElementById('municipio').value;
    const parroquia = document.getElementById('parroquia').value;
    const direccion = document.getElementById('direccion').value.trim();
    
    // Obtener los textos seleccionados (no los IDs)
    const estadoText = document.getElementById('estado').selectedOptions[0]?.text || '';
    const municipioText = document.getElementById('municipio').selectedOptions[0]?.text || '';
    const parroquiaText = document.getElementById('parroquia').selectedOptions[0]?.text || '';
    
    if (!estado || !municipio || !parroquia || !direccion) {
        showError('Todos los campos de dirección son obligatorios');
        return;
    }
    
    // Mostrar loading
    document.getElementById('loading').style.display = 'block';
    document.getElementById('error').style.display = 'none';
    document.getElementById('submitBtn').disabled = true;

    // Enviar los textos, no los IDs
    const formData = {
        id_factura: parseInt(idFactura),
        estado: estadoText,
        municipio: municipioText,
        parroquia: parroquiaText,
        direccion_detallada: direccion,
        numero_guia: document.getElementById('numeroGuia').value.trim() || null
    };

    console.log('Enviando datos:', formData);

    try {
        const response = await fetch('/api/registrar-envio', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        });

        const result = await response.json();
        console.log('Respuesta:', result);

        if (result.success) {
            window.location.href = 'Envio-exitoso.html';
        } else {
            showError(result.message || 'Error al registrar el envío');
        }
    } catch (error) {
        console.error('Error:', error);
        showError('Error de conexión con el servidor');
    }
});
    </script>
</body>
</html>
