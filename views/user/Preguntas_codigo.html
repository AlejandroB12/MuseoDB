<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codigo de Seguridad</title>
    <link rel="stylesheet" href="/assets/styles/Estilo-login.css">
    <style>
        /* Ajustes para que los select luzcan igual que tus inputs neón */
        select {
            width: 100%;
            padding: 12px 14px;
            font-size: 14px;
            border: 2px solid #333;
            border-radius: 8px;
            outline: none;
            background-color: #252525;
            color: #00ff00; 
            cursor: pointer;
            margin-bottom: 8px;
            transition: all 0.2s ease;
        }
        select:focus {
            border-color: #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.1);
        }
        .question-block {
            margin-bottom: 25px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }
        .question-block:last-of-type {
            border-bottom: none;
        }
        h3 {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="login-container" style="max-width: 450px;"> 
        <form class="login-form" action="/verificar-preguntas" method="POST">
            <h2>Seguridad</h2>
            <p>Responde tus 3 preguntas de seguridad</p>
            
            <div class="question-block">
                <h3>Pregunta #1</h3>
                <select name="pregunta1" required>
                    <option value="" disabled selected>Selecciona una opción...</option>
                    <option value="p1">¿Nombre de tu primera mascota?</option>
                    <option value="p2">¿Nombre de tu escuela primaria?</option>
                    <option value="p3">¿Ciudad donde naciste?</option>
                    <option value="p10">¿Nombre de tu calle de la infancia?</option>
                    <option value="p11">¿Marca de tu primer teléfono móvil?</option>
                </select>
                <div class="input-group">
                    <input type="text" id="resp1" name="resp1" required>
                    <label for="resp1">Tu respuesta</label>
                </div>
            </div>

            <div class="question-block">
                <h3>Pregunta #2</h3>
                <select name="pregunta2" required>
                    <option value="" disabled selected>Selecciona una opción...</option>
                    <option value="p4">¿Marca de tu primer coche?</option>
                    <option value="p5">¿Nombre de tu mejor amigo de la infancia?</option>
                    <option value="p6">¿Tu comida favorita?</option>
                    <option value="p12">¿En qué mes celebras tu cumpleaños?</option>
                    <option value="p13">¿Cuál fue tu primer empleo?</option>
                </select>
                <div class="input-group">
                    <input type="text" id="resp2" name="resp2" required>
                    <label for="resp2">Tu respuesta</label>
                </div>
            </div>

            <div class="question-block">
                <h3>Pregunta #3</h3>
                <select name="pregunta3" required>
                    <option value="" disabled selected>Selecciona una opción...</option>
                    <option value="p7">¿Color favorito?</option>
                    <option value="p8">¿Nombre de tu abuelo?</option>
                    <option value="p9">¿Película favorita?</option>
                    <option value="p14">¿Nombre de tu libro favorito?</option>
                    <option value="p15">¿Cuál es tu deporte favorito?</option>
                </select>
                <div class="input-group">
                    <input type="text" id="resp3" name="resp3" required>
                    <label for="resp3">Tu respuesta</label>
                </div>
            </div>

            <button type="submit" class="login-btn">Enviar</button>

        </form>
    </div>
</body>
</html>
