<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Contraseña</title>
    <link rel="stylesheet" href="Estilos/Estilo-login.css">
    <style>
        /* Ajuste específico para el título de esta página */
        .login-form h2.posicion-ajustada {
            margin-top: -30px; /* Sube el h2 más que el estándar de 15px */
            margin-bottom: 20px; /* Ajusta el espacio con el párrafo o input siguiente */
        }
    </style>
</head>
<body>
    <div class="login-container">
        <form class="login-form" action="/update-password" method="POST" onsubmit="return validarPassword()">
            <h2 class="posicion-ajustada">Nueva Contraseña</h2>
            
            <input type="hidden" id="userIdInput" name="userId">

            <div class="input-group">
                <input type="password" id="newPassword" name="newPassword" required>
                <label>Nueva Contraseña</label>
            </div>

            <div class="input-group">
                <input type="password" id="confirmPassword" required>
                <label>Confirmar Contraseña</label>
            </div>

            <button type="submit" class="login-btn">Cambiar Contraseña</button>
        </form>
    </div>

    <script>
        // Obtener el ID de la URL y ponerlo en el input oculto
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('userIdInput').value = urlParams.get('id');

        function validarPassword() {
            const p1 = document.getElementById('newPassword').value;
            const p2 = document.getElementById('confirmPassword').value;
            if (p1 !== p2) {
                alert("Las contraseñas no coinciden.");
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
