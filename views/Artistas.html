<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestros Artistas | MUSEO CONTEMPORANEO</title>
    <link rel="stylesheet" href="Estilos/Estilo-inicio.css">
    <style>
        /* --- ESTILOS BASE --- */
        body { padding-top: 100px; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }

        .container { width: 84%; margin: 0 auto; }

        /* --- NAVBAR (Ajustada para consistencia) --- */
        .navbar {
            position: fixed;
            top: 0; width: 100%; height: 80px; 
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(15px); z-index: 9999; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            box-sizing: border-box;
        }
        .logo { color: white; text-decoration: none; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        .nav-links { display: flex; list-style: none; gap: 30px; margin: 0; padding: 0; }
        .nav-links a { color: white; text-decoration: none; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #00ff00; }

        /* Asegura que el contenedor de navegación gestione bien el espacio */
        .nav-container {
            display: flex;
            align-items: center;
            gap: 40px; /* Aumentamos el espacio entre grupos */
        }

        /* Estilo para el contenedor del usuario */
        .user-profile {
            display: flex;
            align-items: center;
            gap: 20px; /* Espacio entre el saludo, el botón y el logout */
            white-space: nowrap; /* Evita que los elementos se salten a la siguiente línea */
        }

        /* --- CABECERA SECCIÓN --- */
        .section-header { text-align: center; margin-bottom: 60px; }
        .section-header h1 { text-transform: uppercase; letter-spacing: 15px; font-size: 2.5rem; color: #fff; margin-bottom: 10px; }
        .section-header p { color: #00ff00; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 3px; }

        /* --- GRILLA DE ARTISTAS --- */
        .artists-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            padding-bottom: 100px;
        }

        .artist-card {
            background: #0a0a0a;
            border: 1px solid #111;
            padding: 30px 20px;
            text-align: center;
            transition: all 0.4s ease;
            cursor: pointer;
        }

        .artist-card:hover {
            border-color: #00ff00;
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0, 255, 0, 0.05);
        }

        .artist-photo-frame {
            width: 160px; height: 160px;
            margin: 0 auto 25px;
            border: 1px solid #222;
            padding: 5px;
            border-radius: 50%;
            transition: 0.4s;
        }

        .artist-card:hover .artist-photo-frame { border-color: #00ff00; }

        .artist-photo-frame img {
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 50%;
            filter: grayscale(100%);
            transition: 0.4s;
        }

        .artist-card:hover img { filter: grayscale(0%); }

        .artist-name { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; color: #fff; }

        .artist-specialty { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 20px; }
        
        .tag {
            font-size: 0.6rem;
            background: #111;
            color: #00ff00;
            padding: 4px 10px;
            border: 1px solid #222;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .artist-info {
            font-size: 0.7rem;
            color: #555;
            border-top: 1px solid #111;
            padding-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

   <nav class="navbar">
        <a href="../Inicio.html" class="logo" style="text-decoration:none; font-weight:bold; letter-spacing:2px;"> ARTE CONTEMPORANEO</a>
        
        <div class="nav-container">
            <ul class="nav-links">
                <li><a href="Obras.html">Catálogo</a></li>
                <li><a href="Artistas.html">Artistas</a></li>
                
            </ul>

            <div class="auth-buttons" id="auth-buttons">
                <a href="../Inicio_sesion/Login.html" class="btn-login" style="color:white; text-decoration:none; font-size:0.75rem;">INICIAR SESION</a>
                <a href="../Inicio_sesion/Registro.html" class="btn-register" style="border:1px solid #00ff00; color:#00ff00; padding:8px 15px; text-decoration:none; font-size:0.75rem;">REGISTRARTE</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <header class="section-header">
            <h1>Artistas</h1>
            <p>Mentes detrás de la colección</p>
        </header>

        <div class="artists-grid" id="artistsList">
            </div>
    </div>

    <script>
        async function cargarArtistas() {
            try {
                const resp = await fetch('/api/artistas-catalogo');
                if (!resp.ok) throw new Error("Error en la respuesta del servidor");
                
                const artistas = await resp.json();
                const container = document.getElementById('artistsList');
                container.innerHTML = '';

                artistas.forEach(autor => {
                    // Usamos la misma lógica de base64 que tienes en tu servidor
                    const imgPath = autor.Fotografia 
                        ? `data:image/jpeg;base64,${autor.Fotografia}` 
                        : 'Estilos/Imagenes/placeholder-perfil.jpg';

                    const fechaNac = autor.Fecha_nacimiento 
                        ? new Date(autor.Fecha_nacimiento).toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' })
                        : 'Fecha no disponible';

                    const card = document.createElement('div');
                    card.className = 'artist-card';
                    
                    // CORRECCIÓN: Cambiado a Autor.html para que coincida con tu backend
                    card.onclick = () => window.location.href = `Autor.html?id=${autor.id_Autor}`;
                    
                    card.innerHTML = `
                        <div class="artist-photo-frame">
                            <img src="${imgPath}" alt="${autor.Nombre}">
                        </div>
                        <h3 class="artist-name">${autor.Nombre} ${autor.Apellido}</h3>
                        <div class="artist-specialty">
                            ${autor.Especialidades 
                                ? autor.Especialidades.split(',').map(esp => `<span class="tag">${esp.trim()}</span>`).join('') 
                                : '<span class="tag">Varias</span>'}
                        </div>
                        <div class="artist-info">
                            <span>Nacimiento: ${fechaNac}</span>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error("Error al cargar el catálogo de artistas:", error);
                document.getElementById('artistsList').innerHTML = 
                    '<p style="text-align:center; width:100%; color:#444;">Error al conectar con la galería de artistas.</p>';
            }
        }

        window.onload = cargarArtistas;
           document.addEventListener('DOMContentLoaded', () => {
    fetch('/api/estado-usuario')
        .then(response => response.json())
        .then(data => {
            const authContainer = document.querySelector('.auth-buttons');
            const navContainer = document.querySelector('.nav-container');
            
            if (data.autenticado) {
                authContainer.style.display = 'none';

                fetch('/api/usuario-actual')
                    .then(res => res.json())
                    .then(user => {
                        const userDiv = document.createElement('div');
                        userDiv.className = 'user-profile';
                        // Añadimos el estilo al botón de Panel para que se vea profesional
                        userDiv.innerHTML = `
                            <span style="margin-right: 15px;">Hola, ${user.nombre}</span>
                            <a href="../Inicio_sesion/Panel-usuario.html" style="margin-right: 15px; color: #00ff00; text-decoration: none; border: 1px solid #00ff00; padding: 5px 10px; font-size: 0.7rem;">PANEL DE USUARIO</a>
                            <a href="/logout" class="btn-logout">Cerrar Sesión</a>
                        `;
                        navContainer.appendChild(userDiv);
                    });
            }
        });
});
    </script>
</body>
</html>
