<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | MUSEO CONTEMPORANEO</title>
    <link rel="stylesheet" href="Estilos/Estilo-inicio.css">
    <style>
        /* --- ESTILOS BASE --- */
        body {
            padding-top: 100px; 
            background: #050505;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- EFECTO DE DESENFOQUE --- */
        body.modal-active #main-content {
            filter: blur(15px);
            pointer-events: none;
            transition: filter 0.4s ease;
        }

        /* --- NAVBAR --- */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(15px);
            z-index: 9999; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            box-sizing: border-box;
        }

        .nav-left { display: flex; align-items: center; gap: 50px; }
        .nav-links { display: flex; list-style: none; gap: 30px; margin: 0; padding: 0; }
        .nav-links a { color: white; text-decoration: none; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; transition: color 0.3s; }
        .nav-links a:hover { color: #00ff00; }

        /* Busca .nav-container en tu CSS y ajústalo así */
        .nav-container {
            display: flex;
            align-items: center;
            gap: 30px; /* Esto separa los links de los botones de auth */
        }

        /* Agrega esto para que el perfil del usuario no se amontone */
        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
            white-space: nowrap; /* Evita que el texto se rompa en varias líneas */
        }


        .btn-register {
            color: #00ff00;
            text-decoration: none;
            padding: 8px 20px;
            font-size: 0.7rem;
            font-weight: 800;
            background-color: #050505;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid #00ff00;
            transition: 0.3s;
        }
        .btn-register:hover { box-shadow: 0 0 20px rgba(0, 255, 0, 0.4); transform: scale(1.05); }

        /* --- FILTROS --- */
        .filter-container {
            background: #0a0a0a;
            padding: 30px;
            border: 1px solid #111;
            width: 84%;
            margin: 0 auto 50px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            border-radius: 4px;
        }

        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        .filter-group label { color: #00ff00; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        
        select {
            background: #111;
            border: 1px solid #333;
            color: white;
            padding: 10px 15px;
            outline: none;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* --- GALERÍA --- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            padding: 0 8% 100px;
        }

        .art-card {
            background: #0a0a0a;
            border: 1px solid #111;
            transition: 0.3s;
        }

        .art-img {
            width: 100%;
            height: 350px; 
            background-size: cover;
            background-position: center;
            cursor: zoom-in;
            transition: 0.5s;
        }
        .art-img:hover { filter: brightness(1.2); }

        .art-info { padding: 20px; }
        .author-link { color: #00ff00; text-decoration: none; font-size: 0.7rem; text-transform: uppercase; font-weight: 700; }
        .price { font-weight: bold; color: #fff; font-size: 1.1rem; }
        .btn-buy { background: none; border: 1px solid #333; color: #888; padding: 8px 15px; cursor: pointer; transition: 0.3s; }
        .btn-buy:hover { border-color: white; color: white; }

        /* --- MODAL DE EXPANSIÓN --- */
        .modal {
            display: none; 
            position: fixed;
            z-index: 10000;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            align-items: center;
            justify-content: center;
        }

        .modal-contenido {
            display: flex;
            background: #0a0a0a;
            border: 1px solid #222;
            width: 90%;
            max-width: 1100px;
            height: 80vh;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        #modal-imagen { width: 65%; object-fit: contain; background: #000; }

        .modal-info-panel {
            width: 35%;
            padding: 40px;
            overflow-y: auto;
            border-left: 1px solid #222;
        }

        .cerrar-modal {
            position: absolute;
            top: 20px; right: 30px;
            font-size: 2.5rem;
            color: #00ff00;
            cursor: pointer;
            line-height: 1;
            z-index: 10001;
        }

        footer { text-align: center; padding: 60px; font-size: 0.7rem; color: #444; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="main-content">
           <nav class="navbar">
            <a href="../Views/Inicio.html" class="logo" style="text-decoration:none; font-weight:bold; letter-spacing:2px;"> ARTE CONTEMPORANEO</a>
            
            <div class="nav-container">
                <ul class="nav-links">
                    <li><a href="Obras.html">Catálogo</a></li>
                    <li><a href="Artistas.html">Artistas</a></li>
                </ul>

                <div class="auth-buttons" id="auth-buttons">
                    <a href="../Inicio_sesion/Login.html" class="btn-login" style="color:white; text-decoration:none; font-size:0.75rem;">INICIAR SESION</a>
                    <a href="../Inicio_sesion/Registro.html" class="btn-register" style="border:1px solid #00ff00; color:#00ff00; padding:8px 15px; text-decoration:none; font-size:0.75rem;">REGISTRARTE</a>
                </div>
            </div>
        </nav>

        <header style="text-align: center; padding: 60px 0 40px;">
            <h2 style="font-size: 2.5rem; text-transform: uppercase; letter-spacing: 5px;">
                Catálogo <span style="color: #00ff00;">Global</span>
            </h2>
        </header>

        <div class="filter-container">
            <div class="filter-group">
                <label>Orden Precio</label>
                <select id="sortPrice">
                    <option value="asc">Menor a Mayor</option>
                    <option value="desc">Mayor a Menor</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Género</label>
                <select id="filterGenre">
                    <option value="all">Todos los Géneros</option>
                    <option value="Pintura">Pintura</option>
                    <option value="Orfebreria">Orfebrería</option>
                    <option value="Escultura">Escultura</option>
                    <option value="Ceramica">Cerámica</option>
                    <option value="Fotografia">Fotografía</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Autor</label>
                <select id="filterAuthor">
                    <option value="all">Todos los Autores</option>
                </select>
            </div>
        </div>

        <div class="gallery-grid" id="gallery"></div>

        <footer>
            &copy; 2026 MUSEO CONTEMPORANEO. TODOS LOS DERECHOS RESERVADOS.
        </footer>
    </div>

    <div id="obra-modal" class="modal">
        <span class="cerrar-modal" onclick="cerrarModal()">&times;</span>
        <div class="modal-contenido">
            <img id="modal-imagen" src="" alt="Obra expandida">
            <div class="modal-info-panel">
                <h2 id="modal-titulo" style="margin-top: 0;"></h2>
                <p id="modal-artista" style="color: #00ff00; font-size: 0.9rem; text-transform: uppercase;"></p>
                <hr style="border: 0; border-top: 1px solid #222; margin: 25px 0;">
                <div id="modal-detalles-tecnicos" style="font-size: 0.85rem; line-height: 2; color: #ccc;">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const gallery = document.getElementById('gallery');
        const modal = document.getElementById('obra-modal');

        function abrirModal(img, titulo, artista, detalles) {
            document.getElementById('modal-imagen').src = img;
            document.getElementById('modal-titulo').innerText = titulo;
            document.getElementById('modal-artista').innerText = `Por ${artista}`;
            document.getElementById('modal-detalles-tecnicos').innerHTML = detalles;
            
            modal.style.display = 'flex';
            document.body.classList.add('modal-active');
        }

        function cerrarModal() {
            modal.style.display = 'none';
            document.body.classList.remove('modal-active');
        }

        window.onclick = function(event) {
            if (event.target == modal) cerrarModal();
        }

        async function cargarFiltros() {
            try {
                const resp = await fetch('/api/autores');
                const autores = await resp.json();
                const select = document.getElementById('filterAuthor');
                autores.forEach(a => {
                    const opt = document.createElement('option');
                    opt.value = a.id_Autor;
                    opt.textContent = `${a.Nombre} ${a.Apellido}`;
                    select.appendChild(opt);
                });
            } catch (error) { console.error("Error cargando filtros:", error); }
        }

        async function renderGallery() {
            const genero = document.getElementById('filterGenre').value;
            const artista = document.getElementById('filterAuthor').value;
            const orden = document.getElementById('sortPrice').value;

            try {
                const resp = await fetch(`/api/obras-filtradas?genero=${genero}&artista=${artista}&orden=${orden}`);
                const obras = await resp.json();
                gallery.innerHTML = '';
                
                if (obras.length === 0) {
                    gallery.innerHTML = '<p style="text-align:center; width:100%; color:#444;">No hay piezas disponibles.</p>';
                    return;
                }

                obras.forEach(obra => {
                    const base64Img = obra.imagen ? obra.imagen.replace(/\s/g, '') : null;
                    const imgSource = base64Img ? `data:image/jpeg;base64,${base64Img}` : 'placeholder.jpg';

                    let detallesHTML = `
                        <p><strong>GÉNERO:</strong> ${obra.GeneroNombre}</p>
                        ${obra.Tecnica ? `<p><strong>TÉCNICA:</strong> ${obra.Tecnica}</p>` : ''}
                        ${obra.dimensiones_cm ? `<p><strong>DIMENSIONES:</strong> ${obra.dimensiones_cm}</p>` : ''}
                        ${obra.Material ? `<p><strong>MATERIAL:</strong> ${obra.Material}</p>` : ''}
                        ${obra.Metal_Base ? `<p><strong>METAL:</strong> ${obra.Metal_Base}</p>` : ''}
                        ${obra.Piedras_Preciosas ? `<p><strong>PIEDRAS:</strong> ${obra.Piedras_Preciosas}</p>` : ''}
                        ${obra.Formato ? `<p><strong>FORMATO:</strong> ${obra.Formato}</p>` : ''}
                    `;

                    const autorNombreCompleto = `${obra.AutorNombre} ${obra.AutorApellido}`;

                    const card = document.createElement('div');
                    card.className = 'art-card';
                    card.innerHTML = `
                        <div class="art-img" style="background-image: url('${imgSource}')" 
                             onclick="abrirModal('${imgSource}', '${obra.Nombre}', '${autorNombreCompleto}', \`${detallesHTML}\`)">
                        </div>
                        <div class="art-info">
                            <a href="Autor.html?id=${obra.id_Autor}" class="author-link">
                                ${autorNombreCompleto}
                            </a>
                            <h3 class="art-title" style="margin: 10px 0;">${obra.Nombre}</h3>
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span class="price">${obra.Precio}$</span>
                                <button class="btn-buy" onclick="adquirirObra('${obra.id_obra}', '${obra.Nombre}', '${autorNombreCompleto}', '${obra.Precio}', '${imgSource}')">Adquirir</button>
                            </div>
                        </div>
                    `;
                    gallery.appendChild(card);
                });
            } catch (error) { console.error("Error cargando galería:", error); }
        }

        // --- FUNCIONALIDAD DE REDIRECCIÓN A PAGO ---
// Ejemplo de la función que guarda la obra al hacer clic
        function adquirirObra(id, nombre, autor, precio, imagen) {
            const obra = {
                id_Obra: id,    // Ahora sí recibimos el ID numérico
                nombre: nombre,
                autor: autor,
                precio: precio,
                imagen: imagen
            };
            localStorage.setItem('obraSeleccionada', JSON.stringify(obra));
            window.location.href = "pago.html";
        }

        document.getElementById('sortPrice').addEventListener('change', renderGallery);
        document.getElementById('filterGenre').addEventListener('change', renderGallery);
        document.getElementById('filterAuthor').addEventListener('change', renderGallery);

        window.onload = () => { cargarFiltros(); renderGallery(); };

          document.addEventListener('DOMContentLoaded', () => {
        fetch('/api/estado-usuario')
        .then(response => response.json())
        .then(data => {
            const authContainer = document.querySelector('.auth-buttons');
            const navContainer = document.querySelector('.nav-container');
            
            if (data.autenticado) {
                authContainer.style.display = 'none';

                fetch('/api/usuario-actual')
                    .then(res => res.json())
                    .then(user => {
                        const userDiv = document.createElement('div');
                        userDiv.className = 'user-profile';
                        // Añadimos el estilo al botón de Panel para que se vea profesional
                        userDiv.innerHTML = `
                            <span style="margin-right: 15px;">Hola, ${user.nombre}</span>
                            <a href="../Inicio_sesion/Panel-usuario.html" style="margin-right: 15px; color: #00ff00; text-decoration: none; border: 1px solid #00ff00; padding: 5px 10px; font-size: 0.7rem;">PANEL DE USUARIO</a>
                            <a href="/logout" class="btn-logout">Cerrar Sesión</a>
                        `;
                        navContainer.appendChild(userDiv);
                    });
                }
            });
        });


    </script>
</body>
</html>
