<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error de Acceso | System</title>
    <style>
        /* --- ESTILOS INSPIRADOS EN TU LOGIN --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #121212; /* Fondo oscuro profundo */
            padding: 20px;
            color: white;
        }

        .login-container {
            background: #1e1e1e;
            padding: 50px 40px; 
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        /* --- CONTENIDO DE ERROR --- */
        .error-content h2 {
            color: #00ff00; /* Verde Neón */
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .error-content .status-msg {
            color: #ffffff;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            display: block;
        }

        .error-content p {
            color: #888;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* --- BOTÓN REINTENTAR --- */
        .login-btn {
            width: 100%;ss
            padding: 16px;
            background: #00ff00;
            border: none;
            border-radius: 5px;
            color: #121212;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-btn:hover {
            background: #00cc00;
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        /* Decoración extra para el estilo 'tech' */
        .error-icon {
            font-size: 50px;
            margin-bottom: 20px;
            color: #00ff00;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="error-content">
            <div class="error-icon">⚠</div>
            <h2>Error</h2>
            <span class="status-msg">Credenciales inválidas</span>
            <p>
                El usuario o la contraseña ingresados no coinciden con nuestros registros. Por favor, verifica tus datos.
            </p>
            <a href="inicio_sesion/Login.html" class="login-btn">Volver a intentar</a>
        </div>
    </div>
</body>
</html>
